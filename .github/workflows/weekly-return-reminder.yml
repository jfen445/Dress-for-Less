name: Daily Return Reminder

on:
  schedule:
    # 9am NZST daily (UTC+12). Runs at 10am during NZDT (UTC+13) — one hour drift is acceptable.
    # The endpoint itself no-ops on Auckland Sat/Sun, so a daily trigger is simplest.
    - cron: "0 21 * * *"
  workflow_dispatch: # allow manual trigger for testing

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Send return reminder emails
        run: |
          curl -f --location-trusted -X POST https://${{ secrets.APP_URL }}/api/cron/send-return-reminders \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
